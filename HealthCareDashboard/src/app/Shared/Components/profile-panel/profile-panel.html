<div class="profile-panel">
    @if (selectedpatient$ | async; as patient) {

    <div class="profile-header">
        <img [src]="patient.image" alt="">
        <h3>{{patient.name}}</h3>
    </div>

    <div class="profile-info">
        @for(p of patient.profileInfo; track p.label){
        <div class="info-row">
            <img [src]="p.icon">
            <div class="info-text">
                <span>{{p.label}}</span>
                <strong>{{p.value}}</strong>
            </div>
        </div>
        }
    </div>

    <button class="show-btn">
        Show All Information
    </button>
    }
</div>
